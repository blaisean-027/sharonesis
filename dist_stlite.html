  <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@latest/build/stlite.js"></script>
  <script>
    // Prepare files dictionary for Stlite
    const appFiles = {"app.py": "\"\"\"\n\u2554\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2557\n\u2551  SHARONESIS \u2014 \uc2e4\ucc9c\uc801 \uc9c0\ud61c \uae30\ubc18 \uc9c0\uc815\ud559\uc801 \uc804\ub7b5 \uc2dc\ubbac\ub808\uc774\ud130       \u2551\n\u2551  Sharon + Phronesis = Sharonesis                           \u2551\n\u2551  Practical Wisdom Applied to Geopolitical Strategy          \u2551\n\u255a\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255d\n\"\"\"\n\nimport streamlit as st\nimport plotly.graph_objects as go\nimport numpy as np\nimport pandas as pd\nimport time\nfrom datetime import datetime\nfrom collections import Counter\n\nfrom theme import THEME_CSS, PLOTLY_LAYOUT_DEFAULTS, PLOTLY_AXIS_STYLE, GAUGE_COLORS, RADAR_BG, RADAR_GRID\nfrom countries import COUNTRIES\nfrom oracle import bayesian_update\nfrom engine import run_monte_carlo\n\n# \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n# PAGE CONFIG\n# \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nst.set_page_config(\n    page_title=\"Sharonesis \u2014 \uc804\ub7b5 \uc2dc\ubbac\ub808\uc774\ud130\",\n    page_icon=\"\ud83e\uded2\",\n    layout=\"wide\",\n    initial_sidebar_state=\"collapsed\"\n)\n\n# PWA Meta tags and Service Worker Registration\nPWA_TAGS = \"\"\"\n<link rel=\"manifest\" href=\"/app/static/manifest.json\">\n<meta name=\"apple-mobile-web-app-capable\" content=\"yes\">\n<meta name=\"apple-mobile-web-app-status-bar-style\" content=\"black-translucent\">\n<meta name=\"apple-mobile-web-app-title\" content=\"Sharonesis\">\n<link rel=\"apple-touch-icon\" href='data:image/svg+xml,<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 100 100\"><text y=\".9em\" font-size=\"90\">\ud83e\uded2<\\/text><\\/svg>'>\n<script>\n  if ('serviceWorker' in navigator) {\n    window.addEventListener('load', () => {\n      navigator.serviceWorker.register('/app/static/sw.js').then(registration => {\n        console.log('SW registered: ', registration);\n      }).catch(registrationError => {\n        console.log('SW registration failed: ', registrationError);\n      });\n    });\n  }\n<\\/script>\n\"\"\"\nst.markdown(PWA_TAGS, unsafe_allow_html=True)\nst.markdown(THEME_CSS, unsafe_allow_html=True)\n\n# \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n# SESSION STATE\n# \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ndefaults = {\n    \"dynamic_countries\": dict(COUNTRIES),\n    \"oracle_data\": {},\n    \"pending_news_analysis\": {},\n    \"war_probability\": {n: 0.12 for n in COUNTRIES},\n    \"prob_history\": {n: [0.12] for n in COUNTRIES},\n    \"scan_count\": 0,\n    \"black_swan_events\": [],\n    \"history_messages\": [],\n    \"history_a_troops\": 0,\n    \"history_b_troops\": 0,\n    \"history_alpha\": 0.001,\n    \"history_beta\": 0.001,\n}\nfor k, v in defaults.items():\n    if k not in st.session_state:\n        st.session_state[k] = v\n\n\n# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n#  SIDEBAR\n# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nwith st.sidebar:\n    st.markdown(\"\"\"\n    <div style=\"text-align:center; margin-bottom:1.2rem; padding-top:0.5rem;\">\n        <span style=\"font-family:'Cormorant Garamond',serif; font-size:1.6rem;\n              color:#808a2c; font-weight:700;\">Sharonesis<\\/span><br>\n        <span style=\"color:#8a8a8a; font-size:0.6rem; letter-spacing:0.15em;\n              font-family:'Inter',sans-serif;\">\n            PRACTICAL WISDOM IN STRATEGY\n        <\\/span>\n    <\\/div>\n    \"\"\", unsafe_allow_html=True)\n\n\n\n    \n    # \u2699\ufe0f \uc2dc\ubbac\ub808\uc774\uc158 \uc124\uc815\uc740 Nesis(\uc6cc\uac8c\uc784) \ubaa8\ub4dc \uc804\uc6a9\n    current_m = st.session_state.get(\"current_app_mode\", None)\n    if current_m == \"\u2694\ufe0f Nesis (Wargame)\":\n        st.markdown(\"---\")\n        st.markdown(\"#### \u2699\ufe0f \uc2dc\ubbac\ub808\uc774\uc158 \uc124\uc815\")\n        mc_iterations = st.slider(\"Monte Carlo \ubc18\ubcf5\", 1000, 100000, 10000, 1000)\n        noise_sigma = st.slider(\"\ub178\uc774\uc988 \uacc4\uc218 (\u03c3)\", 0.02, 0.20, 0.08, 0.01)\n        black_swan_rate = st.slider(\"\ube14\ub799\uc2a4\uc644 \ud655\ub960 (%)\", 0.0, 1.0, 0.1, 0.05)\n    \n        st.markdown(\"---\")\n        st.markdown(\"#### \ud83c\udf0d \uad6d\uac00 \ucd94\uac00 \ub85c\ub4dc\")\n        new_country = st.text_input(\"\uc0c8 \uad6d\uac00\uba85 (\uc608: \uc774\ub780, \ub300\ub9cc)\", placeholder=\"\uad6d\uac00\uba85 \uc785\ub825 \ud6c4 \uc5d4\ud130\")\n        if new_country:\n            from oracle import get_api_key\n            if not get_api_key(\"gemini\"):\n                st.error(\"API \ud0a4\uac00 \ud544\uc694\ud569\ub2c8\ub2e4.\")\n            else:\n                with st.spinner(f\"'{new_country}' \ub370\uc774\ud130 \uac80\uc0c9 \ubc0f \uc815\ub7c9\ud654 \uc911...\"):\n                    from oracle import load_country_data_via_llm\n                    import db\n                    cdata = load_country_data_via_llm(new_country)\n                    if \"error\" not in cdata:\n                        cname = cdata[\"name\"]\n                        st.session_state.dynamic_countries[cname] = cdata\n                        if cname not in st.session_state.war_probability:\n                            st.session_state.war_probability[cname] = 0.12\n                            st.session_state.prob_history[cname] = [0.12]\n                            \n                        # SQLite DB\uc5d0 \uc601\uad6c \uc800\uc7a5 (\ub2e4\uc74c \uc571 \uc2e4\ud589 \uc2dc \uc790\ub3d9 \ub85c\ub4dc\ub428)\n                        db.upsert_country(cname, cdata)\n                        \n                        st.success(f\"{cdata.get('flag','\ud83c\udf0d')} {cname} \ub85c\ub4dc \uc644\ub8cc \ubc0f DB \uc800\uc7a5 \uc644\ub8cc!\")\n                        time.sleep(1)\n                        st.rerun()\n                    else:\n                        st.error(cdata[\"error\"])\n\n    st.markdown(\"---\")\n    st.markdown(\"#### \ud83d\udd11 API \uc124\uc815\")\n    \n    # Check if we have secrets natively\n    has_native_gemini = False\n    has_native_tavily = False\n    try:\n        if 'api_keys' in st.secrets:\n            has_native_gemini = 'GEMINI_API_KEY' in st.secrets['api_keys']\n            has_native_tavily = 'TAVILY_API_KEY' in st.secrets['api_keys']\n    except FileNotFoundError:\n        pass\n    \n    if not has_native_gemini:\n        st.session_state[\"GEMINI_API_KEY\"] = st.text_input(\"Gemini API Key\", type=\"password\", \n                                                           value=st.session_state.get(\"GEMINI_API_KEY\", \"\"))\n    if not has_native_tavily:\n        st.session_state[\"TAVILY_API_KEY\"] = st.text_input(\"Tavily API Key\", type=\"password\", \n                                                           value=st.session_state.get(\"TAVILY_API_KEY\", \"\"))\n    \n    st.markdown(\"#### \ud83d\udcca \uc2dc\uc2a4\ud15c \ud604\ud669\")\n    gemini_ready = has_native_gemini or st.session_state.get(\"GEMINI_API_KEY\")\n    tavily_ready = has_native_tavily or st.session_state.get(\"TAVILY_API_KEY\")\n    \n    status_api = \"\ud83d\udfe2 \uc5f0\uacb0 \uc900\ube44\ub428\" if (gemini_ready and tavily_ready) else \"\ud83d\udfe1 \ud0a4 \uc785\ub825 \ud544\uc694\"\n    st.markdown(f\"**API\uc0c1\ud0dc:** {status_api}\")\n    st.markdown(f\"**\uc790\ub3d9\uc800\uc7a5(DB):** \ud83d\udfe2 \ud65c\uc131\")\n    st.markdown(f\"**\uc2a4\uce94:** {st.session_state.scan_count}\ud68c\")\n    ts = datetime.now().strftime(\"%H:%M:%S\")\n    st.caption(f\"\u23f1 {ts}\")\n\n\n# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n#  HEADER\n# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nst.markdown(\"\"\"\n<div style=\"text-align:center; padding:1rem 0 0.5rem 0;\">\n    <h1 style=\"margin:0; font-size:2.2rem !important;\">\ud83e\uded2 Sharonesis<\\/h1>\n    <p style=\"color:#8a8a8a; font-size:0.72rem; letter-spacing:0.12em; margin-top:0.2rem;\n       font-family:'Inter',sans-serif;\">\n        \uc2e4\ucc9c\uc801 \uc9c0\ud61c \uae30\ubc18 \uc9c0\uc815\ud559\uc801 \uc804\ub7b5 \uc2dc\ubbac\ub808\uc774\ud130 \u2014 The Sensor \u00b7 The Engine\n    <\\/p>\n<\\/div>\n\"\"\", unsafe_allow_html=True)\n\n# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n#  MODE SELECTION (SPLASH SCREEN & SIDEBAR)\n# \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nif \"current_app_mode\" not in st.session_state:\n    st.session_state.current_app_mode = None\n\nif st.session_state.current_app_mode is None:\n    st.markdown(\"<br><br>\", unsafe_allow_html=True)\n    c1, c2 = st.columns(2)\n    with c1:\n        st.markdown(\"\"\"<div class=\"phronesis-panel\" style=\"text-align:center; padding:2rem;\">\n            <div style=\"font-size:2.5rem;\">\ud83e\uded2<\\/div>\n            <h3>Sharo<\\/h3>\n            <p class=\"muted-text\">\ud504\ub86c\ud504\ud2b8 \uae30\ubc18 AI \uc804\ub7b5 \ubd84\uc11d\uad00<br>\uc9c8\ubb38\ud558\uba74 AI\uac00 \ud544\uc694\ud55c \uc2dc\uac01\ud654\ub97c \uc790\uc728 \ud310\ub2e8<\\/p>\n        <\\/div>\"\"\", unsafe_allow_html=True)\n        if st.button(\"\ud83e\uded2 Sharo \uc2dc\uc791\", use_container_width=True, type=\"primary\"):\n            st.session_state.current_app_mode = \"\ud83e\uded2 Sharo\"\n            st.rerun()\n    with c2:\n        st.markdown(\"\"\"<div class=\"phronesis-panel-warn\" style=\"text-align:center; padding:2rem;\">\n            <div style=\"font-size:2.5rem;\">\u2694\ufe0f<\\/div>\n            <h3>Nesis<\\/h3>\n            <p class=\"muted-text\">\ud504\ub86c\ud504\ud2b8 \uae30\ubc18 \uc778\ud130\ub799\ud2f0\ube0c \uc6cc\uac8c\uc784<br>\uc2dc\ub098\ub9ac\uc624 \uc124\uc815 \u2192 \ud3b8 \uc120\ud0dd \u2192 \ud134\uc81c \uc804\ud22c<\\/p>\n        <\\/div>\"\"\", unsafe_allow_html=True)\n        if st.button(\"\u2694\ufe0f Nesis \uc2dc\uc791\", use_container_width=True, type=\"primary\"):\n            st.session_state.current_app_mode = \"\u2694\ufe0f Nesis (Wargame)\"\n            st.rerun()\n            \n    st.stop()\nelse:\n    st.sidebar.markdown(\"---\")\n    st.sidebar.markdown(\"#### \ud83e\udded NEXUS Navigation\")\n    MODES = [\"\ud83e\uded2 Sharo\", \"\u2694\ufe0f Nesis (Wargame)\"]\n    if st.session_state.current_app_mode not in MODES:\n        st.session_state.current_app_mode = MODES[0]\n        \n    app_mode = st.sidebar.radio(\"\ubaa8\ub4dc \uc120\ud0dd\", MODES, index=MODES.index(st.session_state.current_app_mode))\n    \n    if app_mode != st.session_state.current_app_mode:\n        st.session_state.current_app_mode = app_mode\n        st.rerun()\n\n\n# \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n#  SHARO MODE \u2014 \ud1b5\ud569 AI \uc804\ub7b5 \ubd84\uc11d\uad00\n# \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nif app_mode == '\ud83e\uded2 Sharo':\n    st.markdown('---')\n    st.markdown(\"## \ud83e\udde0 Sharonesis Intelligence Agency (SIA)\")\n    st.markdown(\"\"\"\n    <div class=\"phronesis-panel\">\n        <span class=\"olive-text\">Autonomous ReAct Agent<\\/span> \u2014\n        \uc9c8\ubb38\ud558\uba74 AI\uac00 Thought\u2192Integration\u2192Reflection \ub8e8\ud504\ub85c \uc790\uc728 \ubd84\uc11d \ud6c4,\n        \ud544\uc694\ud55c \uc2dc\uac01\ud654(\uc704\ud611 \uac8c\uc774\uc9c0, 3D \uc9c0\ub3c4, \ub808\uc774\ub354, \ub780\uccb4\uc2a4\ud130 \uc2dc\ubbac)\ub97c \uc790\ub3d9 \ud310\ub2e8\ud558\uc5ec \ub80c\ub354\ub9c1\ud569\ub2c8\ub2e4.\n    <\\/div>\n    \"\"\", unsafe_allow_html=True)\n    \n    # Session state for Sharo chat\n    if \"sharo_messages\" not in st.session_state:\n        st.session_state.sharo_messages = []\n    if \"sharo_last_result\" not in st.session_state:\n        st.session_state.sharo_last_result = None\n    \n    # Chat history display\n    for msg in st.session_state.sharo_messages:\n        with st.chat_message(msg[\"role\"]):\n            st.write(msg[\"content\"])\n    \n    # Chat input\n    user_input = st.chat_input(\"SIA\uc5d0\uac8c \uc9c8\ubb38\ud558\uc138\uc694 (\uc608: \uc774\ub780-\uc774\uc2a4\ub77c\uc5d8 \uc804\uba74\uc804 \uac00\ub2a5\uc131\uc740?)\")\n    \n    if user_input:\n        st.session_state.sharo_messages.append({\"role\": \"user\", \"content\": user_input})\n        \n        with st.chat_message(\"user\"):\n            st.write(user_input)\n        \n        with st.chat_message(\"assistant\"):\n            with st.spinner(\"\ud83e\udde0 SIA ReAct \ubd84\uc11d \uc911... (Thought\u2192Integration\u2192Reflection)\"):\n                from oracle import get_api_key\n                if not get_api_key(\"gemini\"):\n                    st.error(\"\u26a0\ufe0f API \ud0a4\ub97c \uc0ac\uc774\ub4dc\ubc14 \uba54\ub274\uc5d0 \uc785\ub825\ud574\uc8fc\uc138\uc694.\")\n                else:\n                    from oracle import run_sovereign_agent_pipeline\n                    agent_res = run_sovereign_agent_pipeline(user_input, st.session_state.dynamic_countries)\n                    \n                    if \"error\" in agent_res:\n                        st.error(f\"SIA \uc5d0\ub7ec: {agent_res['error']}\")\n                    else:\n                        st.session_state.sharo_last_result = agent_res\n                        \n                        # \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n                        # SECTION 0: DIRECT ANSWER (\ud56d\uc0c1 \ud45c\uc2dc)\n                        # \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n                        da = agent_res.get(\"direct_answer\", {})\n                        confidence = agent_res.get(\"confidence\", 0.5)\n                        \n                        interpreted = da.get(\"user_question_interpreted\", \"\")\n                        if interpreted:\n                            st.caption(f\"\ud83d\udccc \uc9c8\ubb38 \ud574\uc11d: {interpreted}\")\n                        \n                        answer_text = da.get(\"answer\", \"\")\n                        if answer_text:\n                            st.markdown(f\"\"\"<div style=\"background: linear-gradient(135deg, #2d3436 0%, #1a1a2e 100%);\n                                border-left: 4px solid #ffd700; border-radius: 8px; padding: 1.2rem 1.5rem;\n                                color: #f0f0f0; font-size: 0.95rem; line-height: 1.7; margin: 0.8rem 0;\">\n                                {answer_text}<\\/div>\"\"\", unsafe_allow_html=True)\n                        \n                        da_cols = st.columns([1, 2])\n                        with da_cols[0]:\n                            esc_prob = da.get(\"escalation_probability\", 0)\n                            st.metric(\"\ud655\uc804 \ud655\ub960\", f\"{esc_prob*100:.0f}%\")\n                            st.progress(min(esc_prob, 1.0))\n                        with da_cols[1]:\n                            conclusion = da.get(\"key_conclusion\", \"\")\n                            if conclusion:\n                                st.markdown(f\"**\ud83d\udca1 \ud575\uc2ec \uacb0\ub860:**\")\n                                st.info(conclusion)\n                        \n                        # \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n                        # REACT CHAIN (\uc811\uae30)\n                        # \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n                        rc = agent_res.get(\"react_chain\", {})\n                        if rc:\n                            with st.expander(\"\ud83e\udde0 ReAct \uc790\uc728 \uc0ac\uace0 \uccb4\uc778\", expanded=False):\n                                for phase, (icon, label) in {\"thought\": (\"\ud83d\udd0d\", \"THOUGHT\"), \"integration\": (\"\ud83d\udd17\", \"INTEGRATION\"), \"reflection\": (\"\ud83d\udee1\ufe0f\", \"REFLECTION\")}.items():\n                                    val = rc.get(phase, \"\")\n                                    if val:\n                                        st.markdown(f\"**{icon} {label}**\")\n                                        st.markdown(f\"> {val}\")\n                                adj = rc.get(\"confidence_adjustment\", \"\")\n                                if adj:\n                                    st.caption(f\"\u2696\ufe0f {adj}\")\n                        \n                        # \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n                        # SITUATION ASSESSMENT\n                        # \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n                        sit = agent_res.get(\"situation_assessment\", {})\n                        if sit.get(\"current_status\"):\n                            st.markdown(\"---\")\n                            st.markdown(\"### \ud83d\udce1 \uc815\uc138 \ube0c\ub9ac\ud551\")\n                            conf_cols = st.columns([3, 1])\n                            with conf_cols[0]:\n                                st.markdown(f\"> {sit.get('current_status', '')}\")\n                            with conf_cols[1]:\n                                st.metric(\"\uc2e0\ub8b0\ub3c4\", f\"{confidence:.0%}\")\n                                st.progress(min(confidence, 1.0))\n                            kf = sit.get(\"key_factors\", [])\n                            for i, f_item in enumerate(kf, 1):\n                                st.markdown(f\"  {i}. {f_item}\")\n                            intel_src = sit.get(\"intelligence_sources\", \"\")\n                            if intel_src:\n                                st.caption(f\"\ud83d\udcf0 {intel_src}\")\n                        \n                        # \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n                        # SCENARIOS (\ud56d\uc0c1 \ud45c\uc2dc)\n                        # \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n                        scenarios = agent_res.get(\"scenarios\", {})\n                        if scenarios:\n                            st.markdown(\"---\")\n                            st.markdown(\"### \ud83d\udd2e \uc2dc\ub098\ub9ac\uc624 \ubd84\uc11d\")\n                            sc_tabs = st.tabs([\"\ud83d\udfe2 \ucd5c\uc120\", \"\u26aa \ud604\uc2e4\uc801\", \"\ud83d\udd34 \ucd5c\uc545\"])\n                            for tab, (skey, emoji) in zip(sc_tabs, [(\"best_case\",\"\ud83d\udfe2\"), (\"realistic\",\"\u26aa\"), (\"worst_case\",\"\ud83d\udd34\")]):\n                                with tab:\n                                    s = scenarios.get(skey, {})\n                                    st.markdown(f\"**{emoji} {s.get('title', skey)}** \u2014 \ubc1c\uc0dd \ud655\ub960: {s.get('probability',0)*100:.0f}%\")\n                                    st.markdown(f\"> {s.get('description', '')}\")\n                        \n                        # Save summary message\n                        summary_text = da.get(\"key_conclusion\", answer_text[:100] if answer_text else \"\ubd84\uc11d \uc644\ub8cc\")\n                        st.session_state.sharo_messages.append({\"role\": \"assistant\", \"content\": summary_text})\n                        \n                        # \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n                        # CONDITIONAL RENDERS (AI render_hints \ud310\ub2e8)\n                        # \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n                        hints = agent_res.get(\"render_hints\", {})\n                        render_reason = hints.get(\"render_reason\", \"\")\n                        if render_reason:\n                            st.caption(f\"\ud83e\udd16 \uc2dc\uac01\ud654 \ud310\ub2e8: {render_reason}\")\n                        \n                        # --- FACT SCAN (run_fact_scan) ---\n                        if hints.get(\"run_fact_scan\"):\n                            st.markdown(\"---\")\n                            st.markdown(\"### \ud83d\udce1 \uc2e4\uc2dc\uac04 \ud329\ud2b8\uccb4\ud06c \uc2a4\uce94\")\n                            with st.spinner(\"5-Filter \ud329\ud2b8\uccb4\ud06c \uc9c4\ud589 \uc911...\"):\n                                st.session_state.pending_news_analysis = {}\n                                items = list(st.session_state.dynamic_countries.items())\n                                for idx, (name, cd) in enumerate(items):\n                                    from oracle import run_intelligence_pipeline, get_api_key\n                                    api_key = get_api_key(\"gemini\")\n                                    tavily_key = get_api_key(\"tavily\")\n                                    result = run_intelligence_pipeline(api_key, tavily_key, name, cd[\"code\"], \"\")\n                                    if \"error\" not in result:\n                                        st.session_state.pending_news_analysis[name] = result\n                                        # Update probabilities\n                                        from oracle import bayesian_update\n                                        p = bayesian_update(result, st.session_state.war_probability.get(name, 0.12))\n                                        st.session_state.war_probability[name] = p\n                                        st.session_state.prob_history[name].append(p)\n                                st.session_state.scan_count += 1\n                            st.success(\"\u2705 \ud329\ud2b8\uccb4\ud06c \uc644\ub8cc\")\n                        \n                        # --- WAR GAUGES (show_war_gauges) ---\n                        if hints.get(\"show_war_gauges\") and st.session_state.war_probability:\n                            st.markdown(\"---\")\n                            st.markdown(\"### \u26a0\ufe0f \uc804\uc7c1 \ud655\ub960 \uac8c\uc774\uc9c0\")\n                            g_cols = st.columns(len(st.session_state.dynamic_countries))\n                            for idx, (name, cd) in enumerate(st.session_state.dynamic_countries.items()):\n                                with g_cols[idx]:\n                                    prob = st.session_state.war_probability.get(name, 0.12)\n                                    fig = go.Figure(go.Indicator(\n                                        mode=\"gauge+number+delta\",\n                                        value=prob * 100,\n                                        number={\"suffix\": \"%\", \"font\": {\"size\": 28, \"color\": \"#5a5a5a\", \"family\": \"IBM Plex Mono\"}},\n                                        delta={\"reference\": 12, \"increasing\": {\"color\": \"#b54a32\"}, \"decreasing\": {\"color\": \"#7a8a6a\"}},\n                                        title={\"text\": f\"{cd['flag']} {cd['code']}<br><span style='font-size:0.6em;color:#8a8a8a'>\uc804\uc7c1 \ud655\ub960<\\/span>\",\n                                               \"font\": {\"size\": 12, \"color\": \"#5a5a5a\", \"family\": \"Inter\"}},\n                                        gauge={\n                                            \"axis\": {\"range\": [0, 100], \"tickcolor\": \"#d0d0c8\", \"tickfont\": {\"color\": \"#aaa\"}},\n                                            \"bar\": {\"color\": GAUGE_COLORS[\"bar\"], \"thickness\": 0.25},\n                                            \"bgcolor\": GAUGE_COLORS[\"bg\"], \"bordercolor\": GAUGE_COLORS[\"border\"],\n                                            \"steps\": [\n                                                {\"range\": [0, 25], \"color\": GAUGE_COLORS[\"low\"]},\n                                                {\"range\": [25, 55], \"color\": GAUGE_COLORS[\"mid\"]},\n                                                {\"range\": [55, 100], \"color\": GAUGE_COLORS[\"high\"]},\n                                            ],\n                                            \"threshold\": {\"line\": {\"color\": GAUGE_COLORS[\"threshold\"], \"width\": 2}, \"thickness\": 0.75, \"value\": prob * 100}\n                                        }\n                                    ))\n                                    fig.update_layout(height=220, margin=dict(l=15, r=15, t=50, b=5), **PLOTLY_LAYOUT_DEFAULTS)\n                                    st.plotly_chart(fig, use_container_width=True)\n                        \n                        # --- RADAR CHART (show_radar_chart) ---\n                        if hints.get(\"show_radar_chart\") and st.session_state.oracle_data:\n                            st.markdown(\"---\")\n                            st.markdown(\"### \ud83d\udcca \uad6d\uac00 \uc5ed\ub7c9 \ub808\uc774\ub354\")\n                            rcols = st.columns(len(st.session_state.oracle_data))\n                            for idx, (name, res) in enumerate(st.session_state.oracle_data.items()):\n                                with rcols[idx]:\n                                    cats = [\"\uacf5\uaca9\uc131\", \"\ubcf4\uae09\ub9dd\\n\ucde8\uc57d\uc131\", \"\uad6d\uc81c\uc801\\n\uba85\ubd84\"]\n                                    vals = [res.get(\"aggressiveness\", 0), res.get(\"supply_chain_vulnerability\", 0), res.get(\"international_justification\", 0)]\n                                    dinfo = st.session_state.dynamic_countries[name]\n                                    cc = dinfo[\"color\"]\n                                    if cc.startswith(\"#\") and len(cc) == 7:\n                                        r, g, b = int(cc[1:3], 16), int(cc[3:5], 16), int(cc[5:7], 16)\n                                    else:\n                                        r, g, b = 120, 138, 106; cc = \"#7a8a6a\"\n                                    fig = go.Figure()\n                                    fig.add_trace(go.Scatterpolar(\n                                        r=vals + [vals[0]], theta=cats + [cats[0]], fill=\"toself\",\n                                        fillcolor=f\"rgba({r},{g},{b},0.18)\", line=dict(color=cc, width=2), name=dinfo[\"code\"]\n                                    ))\n                                    fig.update_layout(\n                                        polar=dict(bgcolor=RADAR_BG, radialaxis=dict(visible=True, range=[0, 1], gridcolor=RADAR_GRID, linecolor=RADAR_GRID, tickfont=dict(color=\"#aaa\", size=8)),\n                                                   angularaxis=dict(gridcolor=RADAR_GRID, linecolor=RADAR_GRID, tickfont=dict(color=\"#6b7328\", size=9, family=\"Inter\"))),\n                                        showlegend=False, title=dict(text=f\"{dinfo.get('flag','\ud83c\udf0d')} {dinfo['code']}\", font=dict(color=\"#5a5a5a\", size=12, family=\"Inter\"), x=0.5),\n                                        height=270, margin=dict(l=30, r=30, t=40, b=20), **PLOTLY_LAYOUT_DEFAULTS\n                                    )\n                                    st.plotly_chart(fig, use_container_width=True)\n                        \n                        # --- PROBABILITY TIMELINE (show_probability_timeline) ---\n                        if hints.get(\"show_probability_timeline\"):\n                            st.markdown(\"---\")\n                            st.markdown(\"### \ud83d\udcc8 \ud655\ub960 \ucd94\uc774\")\n                            fig_tl = go.Figure()\n                            for name, cd in st.session_state.dynamic_countries.items():\n                                h = st.session_state.prob_history[name]\n                                fig_tl.add_trace(go.Scatter(x=list(range(len(h))), y=[v * 100 for v in h],\n                                    mode=\"lines+markers\", name=f\"{cd.get('flag','\ud83c\udf0d')} {cd['code']}\",\n                                    line=dict(color=cd[\"color\"], width=2), marker=dict(size=5, color=cd[\"color\"])))\n                            fig_tl.update_layout(height=300, margin=dict(l=45, r=25, t=15, b=35),\n                                xaxis=dict(title=\"Scan #\", **PLOTLY_AXIS_STYLE), yaxis=dict(title=\"P(war) %\", range=[0, 100], **PLOTLY_AXIS_STYLE),\n                                legend=dict(bgcolor=\"rgba(255,255,255,0.8)\", bordercolor=\"#d5d5ce\", font=dict(color=\"#5a5a5a\", family=\"Inter\")),\n                                hovermode=\"x unified\", **PLOTLY_LAYOUT_DEFAULTS)\n                            st.plotly_chart(fig_tl, use_container_width=True)\n                        \n                        # --- 3D GLOBE (show_3d_globe) ---\n                        if hints.get(\"show_3d_globe\"):\n                            st.markdown(\"---\")\n                            st.markdown(\"### \ud83c\udf0d 3D \uc804\ub7b5 \uc9c0\ub3c4\")\n                            import pydeck as pdk\n                            col_data = []\n                            arc_data = []\n                            country_list = list(st.session_state.dynamic_countries.items())\n                            for name, cd in country_list:\n                                lat, lon = cd.get(\"lat\", 0), cd.get(\"lon\", 0)\n                                if lat == 0 and lon == 0: continue\n                                prob = st.session_state.war_probability.get(name, 0.12)\n                                r_c = min(255, int(prob * 5 * 255))\n                                g_c = max(0, int((1 - prob * 3) * 180))\n                                col_data.append({\"name\": cd.get(\"code\", name[:3]), \"lat\": lat, \"lon\": lon,\n                                    \"elevation\": max(50000, int(prob * 2000000)), \"color\": [r_c, g_c, 40, 200]})\n                            for i in range(len(country_list)):\n                                for j in range(i+1, len(country_list)):\n                                    _, c1 = country_list[i]; _, c2 = country_list[j]\n                                    if c1.get(\"lat\", 0) == 0 or c2.get(\"lat\", 0) == 0: continue\n                                    arc_data.append({\"src_lat\": c1[\"lat\"], \"src_lon\": c1[\"lon\"], \"dst_lat\": c2[\"lat\"], \"dst_lon\": c2[\"lon\"]})\n                            if col_data:\n                                deck = pdk.Deck(\n                                    layers=[\n                                        pdk.Layer(\"ColumnLayer\", data=col_data, get_position=[\"lon\", \"lat\"], get_elevation=\"elevation\",\n                                            elevation_scale=1, radius=80000, get_fill_color=\"color\", pickable=True, auto_highlight=True),\n                                        pdk.Layer(\"ArcLayer\", data=arc_data, get_source_position=[\"src_lon\", \"src_lat\"],\n                                            get_target_position=[\"dst_lon\", \"dst_lat\"], get_source_color=[200, 200, 80, 120],\n                                            get_target_color=[200, 60, 60, 120], get_width=2)\n                                    ],\n                                    initial_view_state=pdk.ViewState(latitude=30, longitude=40, zoom=1.5, pitch=45, bearing=0),\n                                    map_style=\"mapbox://styles/mapbox/dark-v10\", tooltip={\"text\": \"{name}\"}\n                                )\n                                st.pydeck_chart(deck, use_container_width=True)\n                                st.caption(\"\ud83d\udd34 \uae30\ub465 = P(war) | \uace1\uc120 = \ubd84\uc7c1 \uad00\uacc4\")\n                        \n                        # --- MONTE CARLO (show_monte_carlo) ---\n                        if hints.get(\"show_monte_carlo\"):\n                            impact = agent_res.get(\"impact_delta\", {})\n                            name_p = impact.get(\"primary_actor\", \"\")\n                            name_t = impact.get(\"target_actor\", \"\")\n                            cd_p = st.session_state.dynamic_countries.get(name_p)\n                            cd_t = st.session_state.dynamic_countries.get(name_t)\n                            a_mod = impact.get(\"alpha_modifier\", 0)\n                            \n                            if cd_p and cd_t:\n                                st.markdown(\"---\")\n                                st.markdown(\"### \u2694\ufe0f \ub780\uccb4\uc2a4\ud130 \ubaac\ud14c\uce74\ub97c\ub85c \uc2dc\ubbac\ub808\uc774\uc158\")\n                                mc_iters = 1000; noise = 0.08; bs_rate = 0.05\n                                res_post = run_monte_carlo(cd_p, cd_t, name_p, name_t, mc_iters, noise, bs_rate,\n                                    cmd_modifiers={\"alpha_multiplier\": 1.0 + a_mod})\n                                win_post = res_post[\"wins_a\"] / mc_iters\n                                \n                                mc_cols = st.columns(3)\n                                mc_cols[0].metric(f\"\ud83d\udfe2 {name_p} \uc2b9\ub960\", f\"{win_post*100:.1f}%\")\n                                mc_cols[1].metric(f\"\ud83d\udd34 {name_t} \uc2b9\ub960\", f\"{res_post['wins_b']/mc_iters*100:.1f}%\")\n                                mc_cols[2].metric(\"\ube14\ub799\uc2a4\uc644\", f\"{len(res_post.get('all_bs_events',[]))}\uac74\")\n                                \n                                # Animated trajectory\n                                sample_ha = res_post.get(\"sample_ha\", [])\n                                sample_hb = res_post.get(\"sample_hb\", [])\n                                if sample_ha and sample_hb:\n                                    ha0 = sample_ha[0]; hb0 = sample_hb[0]\n                                    A0_val = ha0[0] if ha0 else 1; B0_val = hb0[0] if hb0 else 1\n                                    max_steps = len(ha0)\n                                    anim_frames = []\n                                    for step in range(1, max_steps, max(1, max_steps // 60)):\n                                        anim_frames.append(go.Frame(data=[\n                                            go.Scatter(y=[a / A0_val * 100 for a in ha0[:step+1]], mode='lines', line=dict(color='#4ecdc4', width=3), name=name_p),\n                                            go.Scatter(y=[b / B0_val * 100 for b in hb0[:step+1]], mode='lines', line=dict(color='#ff6b6b', width=3), name=name_t),\n                                        ], name=str(step)))\n                                    fig_mc = go.Figure(data=[\n                                        go.Scatter(y=[100], mode='lines', line=dict(color='#4ecdc4', width=3), name=name_p),\n                                        go.Scatter(y=[100], mode='lines', line=dict(color='#ff6b6b', width=3), name=name_t),\n                                    ], frames=anim_frames)\n                                    fig_mc.update_layout(title=\"\u2694\ufe0f \uc2e4\uc2dc\uac04 \uc804\ud22c \uada4\uc801 (\u25b6 \uc7ac\uc0dd)\", xaxis_title=\"Time\", yaxis_title=\"\uc794\uc874 \ubcd1\ub825 (%)\",\n                                        yaxis=dict(range=[0, 115]), height=400, margin=dict(l=40, r=20, t=50, b=80),\n                                        paper_bgcolor='rgba(0,0,0,0)', plot_bgcolor='rgba(0,0,0,0)', font=dict(size=11),\n                                        legend=dict(orientation=\"h\", yanchor=\"bottom\", y=-0.3, xanchor=\"center\", x=0.5),\n                                        updatemenus=[dict(type=\"buttons\", showactive=False, y=-0.15, x=0.5, xanchor=\"center\", buttons=[\n                                            dict(label=\"\u25b6 \uc7ac\uc0dd\", method=\"animate\", args=[None, {\"frame\": {\"duration\": 50, \"redraw\": True}, \"fromcurrent\": True}]),\n                                            dict(label=\"\u23f8 \uc815\uc9c0\", method=\"animate\", args=[[None], {\"frame\": {\"duration\": 0}, \"mode\": \"immediate\"}])\n                                        ])]\n                                    )\n                                    st.plotly_chart(fig_mc, use_container_width=True)\n                                \n                                # Black Swan alerts\n                                bs_events = res_post.get(\"all_bs_events\", [])\n                                if bs_events:\n                                    seen = set()\n                                    for evt in bs_events:\n                                        ename = evt.get(\"event\", \"\")\n                                        if ename in seen: continue\n                                        seen.add(ename)\n                                        st.markdown(f\"\"\"<div class=\"black-swan-alert\">\n                                            <div class=\"bs-title\">\u26a0\ufe0f BLACK SWAN \u2014 {ename}<\\/div>\n                                            <div class=\"bs-desc\">\ud83d\udca5 {evt.get('desc', '')}<\\/div>\n                                        <\\/div>\"\"\", unsafe_allow_html=True)\n\n\n\n\n\n\n\n\n\n\n\n# \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n#  NESIS MODE \u2014 \uc6cc\uac8c\uc784\n# \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nif app_mode == '\u2694\ufe0f Nesis (Wargame)':\n    st.markdown('---')\n    st.markdown(\"## \u2694\ufe0f Nesis \uc778\ud130\ub799\ud2f0\ube0c \uc6cc\uac8c\uc784\")\n    st.markdown(\"\"\"\n    <div class=\"phronesis-panel-warn\">\n        <span class=\"alert-text\">Prompt-Driven Wargame<\\/span> \u2014\n        \uc2dc\ub098\ub9ac\uc624\ub97c \ud14d\uc2a4\ud2b8\ub85c \uc124\uc815\ud558\uba74 AI\uac00 \uc2e4\uc81c \ud329\ud2b8\ub97c \uc218\uc9d1\ud558\uc5ec \uc591\uce21 \uc138\ub825\uc744 \uad6c\ucd95\ud558\uace0,\n        \ub2f9\uc2e0\uc774 \ud3b8\uc744 \uace8\ub77c \ud134\uc81c \uc804\ub7b5 \uc2dc\ubbac\ub808\uc774\uc158\uc73c\ub85c \uc0c1\ud638\uc791\uc6a9\ud569\ub2c8\ub2e4.\n    <\\/div>\n    \"\"\", unsafe_allow_html=True)\n    \n    # Session state for wargame phases\n    if \"wg_phase\" not in st.session_state:\n        st.session_state.wg_phase = 1  # 1=\uc785\ub825, 2=\ud3b8\uc120\ud0dd, 3=\uc804\ud22c\n    if \"wg_scenario\" not in st.session_state:\n        st.session_state.wg_scenario = None\n    if \"wg_player_side\" not in st.session_state:\n        st.session_state.wg_player_side = None\n    if \"wg_messages\" not in st.session_state:\n        st.session_state.wg_messages = []\n    if \"wg_a_troops\" not in st.session_state:\n        st.session_state.wg_a_troops = 0\n    if \"wg_b_troops\" not in st.session_state:\n        st.session_state.wg_b_troops = 0\n    \n    # Reset button\n    if st.session_state.wg_phase > 1:\n        if st.button(\"\ud83d\udd04 \uc0c8 \uc2dc\ub098\ub9ac\uc624 \uc2dc\uc791\", use_container_width=False):\n            st.session_state.wg_phase = 1\n            st.session_state.wg_scenario = None\n            st.session_state.wg_player_side = None\n            st.session_state.wg_messages = []\n            st.session_state.wg_a_troops = 0\n            st.session_state.wg_b_troops = 0\n            st.rerun()\n    \n    # \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n    # PHASE 1: SCENARIO PROMPT INPUT\n    # \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n    if st.session_state.wg_phase == 1:\n        st.markdown(\"### \ud83d\udcdd Phase 1: \uc2dc\ub098\ub9ac\uc624 \uc124\uc815\")\n        st.markdown(\"> \uc5b4\ub5a4 \uc804\uc7c1/\ubd84\uc7c1\uc744 \uc2dc\ubbac\ub808\uc774\uc158\ud558\uace0 \uc2f6\uc740\uc9c0 \uc790\uc720\ub86d\uac8c \uc124\uba85\ud558\uc138\uc694. AI\uac00 \uc591\uce21 \uc138\ub825\uc758 \uc2e4\uc81c \uad70\uc0ac \ub370\uc774\ud130\ub97c \uc218\uc9d1\ud569\ub2c8\ub2e4.\")\n        \n        scenario_prompt = st.text_area(\n            \"\uc2dc\ub098\ub9ac\uc624 \uc124\uba85\",\n            placeholder=\"\uc608: \uac78\ud504\uc804 \uc2dc\uae30\uc758 \uc774\ub77c\ud06c vs \ubbf8\uad6d \ub2e4\uad6d\uc801 \uc5f0\ud569\uad70 \uc2dc\ubbac\uc744 \ud574\ubcf4\uace0 \uc2f6\uc5b4\\n\uc608: \uc784\uc9c4\uc65c\ub780 \ub2f9\uc2dc \uc870\uc120 \uc218\uad70 vs \uc77c\ubcf8 \uc218\uad70\\n\uc608: \ud604\uc7ac \uc2dc\uc810\uc5d0\uc11c \uc774\ub780 vs \uc774\uc2a4\ub77c\uc5d8\uc774 \uc804\uba74\uc804\uc744 \ubc8c\uc778\ub2e4\uba74?\",\n            height=100\n        )\n        \n        if st.button(\"\ud83d\ude80 \uc2dc\ub098\ub9ac\uc624 \uad6c\ucd95 \uc2dc\uc791\", type=\"primary\", use_container_width=True):\n            from oracle import get_api_key\n            if not scenario_prompt:\n                st.warning(\"\uc2dc\ub098\ub9ac\uc624\ub97c \uc124\uba85\ud574\uc8fc\uc138\uc694.\")\n            elif not get_api_key(\"gemini\"):\n                st.error(\"\u26a0\ufe0f API \ud0a4\ub97c \uc0ac\uc774\ub4dc\ubc14 \uba54\ub274\uc5d0 \uc785\ub825\ud574\uc8fc\uc138\uc694.\")\n            else:\n                with st.spinner(\"\ud83d\udd0d AI\uac00 \uc2e4\uc81c \uad70\uc0ac \ub370\uc774\ud130\ub97c \uc218\uc9d1\ud558\uace0 \uc591\uce21 \uc138\ub825\uc744 \uad6c\ucd95 \uc911...\"):\n                    from oracle import build_wargame_scenario\n                    result = build_wargame_scenario(scenario_prompt)\n                    \n                    if \"error\" in result:\n                        st.error(f\"\uc2dc\ub098\ub9ac\uc624 \uad6c\ucd95 \uc624\ub958: {result['error']}\")\n                    else:\n                        st.session_state.wg_scenario = result\n                        st.session_state.wg_phase = 2\n                        st.rerun()\n    \n    # \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n    # PHASE 2: FORCE COMPARISON & SIDE SELECTION\n    # \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n    elif st.session_state.wg_phase == 2:\n        sc = st.session_state.wg_scenario\n        fa = sc.get(\"force_a\", {})\n        fb = sc.get(\"force_b\", {})\n        \n        st.markdown(f\"### \u2694\ufe0f Phase 2: {sc.get('scenario_title', '\uc2dc\ub098\ub9ac\uc624')}\")\n        st.caption(f\"\ud83d\udd50 {sc.get('scenario_era', '')}\")\n        \n        st.markdown(f\"\"\"<div class=\"phronesis-panel\" style=\"border-left-color: #ffd700;\">\n            {sc.get('scenario_background', '')}\n        <\\/div>\"\"\", unsafe_allow_html=True)\n        \n        # Force comparison chart\n        st.markdown(\"### \ud83d\udcca \uc591\uce21 \uc804\ub825 \ube44\uad50\")\n        cats = [\"\ubcd1\ub825(\ub9cc)\", \"\uad70\uc0ac\ube44\u00d7100\", \"\ud575\ud0c4\ub450\", \"\ud568\uc815\", \"\ud56d\uacf5\uae30\", \"\uc804\ucc28\"]\n        va = [fa.get(\"troops\",0)/1e4, fa.get(\"budget_t\",0)*100, fa.get(\"nukes\",0),\n              fa.get(\"navy_ships\",0), fa.get(\"aircraft\",0), fa.get(\"tanks\",0)]\n        vb = [fb.get(\"troops\",0)/1e4, fb.get(\"budget_t\",0)*100, fb.get(\"nukes\",0),\n              fb.get(\"navy_ships\",0), fb.get(\"aircraft\",0), fb.get(\"tanks\",0)]\n\n        fig_c = go.Figure()\n        fig_c.add_trace(go.Bar(name=f\"{fa.get('flag','')} {fa.get('name','Force A')}\", x=cats, y=va,\n                               marker_color=fa.get(\"color\",\"#4ecdc4\"),\n                               marker_line=dict(color=\"rgba(0,0,0,0.05)\", width=1)))\n        fig_c.add_trace(go.Bar(name=f\"{fb.get('flag','')} {fb.get('name','Force B')}\", x=cats, y=vb,\n                               marker_color=fb.get(\"color\",\"#ff6b6b\"),\n                               marker_line=dict(color=\"rgba(0,0,0,0.05)\", width=1)))\n        fig_c.update_layout(\n            barmode=\"group\", height=300, margin=dict(l=45, r=25, t=15, b=50),\n            xaxis=dict(**PLOTLY_AXIS_STYLE),\n            yaxis=dict(**PLOTLY_AXIS_STYLE),\n            legend=dict(bgcolor=\"rgba(255,255,255,0.8)\", bordercolor=\"#d5d5ce\",\n                        font=dict(color=\"#5a5a5a\", family=\"Inter\")),\n            **PLOTLY_LAYOUT_DEFAULTS\n        )\n        st.plotly_chart(fig_c, use_container_width=True)\n        \n        # Advantages / Weaknesses\n        adv_cols = st.columns(2)\n        with adv_cols[0]:\n            st.markdown(f\"#### {fa.get('flag','')} {fa.get('name','')}\")\n            advs = fa.get(\"key_advantages\", [])\n            for a in advs:\n                st.markdown(f\"- \u2705 {a}\")\n            weaks = fa.get(\"key_weaknesses\", [])\n            for w in weaks:\n                st.markdown(f\"- \u26a0\ufe0f {w}\")\n        with adv_cols[1]:\n            st.markdown(f\"#### {fb.get('flag','')} {fb.get('name','')}\")\n            advs = fb.get(\"key_advantages\", [])\n            for a in advs:\n                st.markdown(f\"- \u2705 {a}\")\n            weaks = fb.get(\"key_weaknesses\", [])\n            for w in weaks:\n                st.markdown(f\"- \u26a0\ufe0f {w}\")\n        \n        hist_out = sc.get(\"historical_outcome\", \"\")\n        if hist_out:\n            with st.expander(\"\ud83d\udcd6 \uc2e4\uc81c \uc5ed\uc0ac\uc801 \uacb0\uacfc (\uc2a4\ud3ec\uc77c\ub7ec \uc8fc\uc758)\"):\n                st.info(hist_out)\n        \n        # Side selection\n        st.markdown(\"---\")\n        st.markdown(\"### \ud83c\udfae \ub2f9\uc2e0\uc758 \ud3b8\uc744 \uc120\ud0dd\ud558\uc138\uc694\")\n        \n        side_cols = st.columns(2)\n        with side_cols[0]:\n            if st.button(f\"{fa.get('flag','')} {fa.get('name','')} \uc9c4\uc601 \uc120\ud0dd\", use_container_width=True, type=\"primary\"):\n                st.session_state.wg_player_side = \"A\"\n                st.session_state.wg_a_troops = fa.get(\"troops\", 10000)\n                st.session_state.wg_b_troops = fb.get(\"troops\", 10000)\n                st.session_state.wg_messages = []\n                # Set initial GM message\n                init_msg = {\n                    \"role\": \"assistant\",\n                    \"content\": {\n                        \"current_turn\": 1,\n                        \"situation_description\": sc.get(\"initial_situation\", \"\uc804\ud22c\uac00 \uc2dc\uc791\ub429\ub2c8\ub2e4.\"),\n                        \"next_options\": [\"\uc815\uba74 \uacf5\uaca9\", \"\uc6b0\ud68c \uae30\ub3d9\", \"\ubc29\uc5b4 \uc804\ud658\"],\n                        \"history_reference\": \"\"\n                    },\n                    \"post_turn_stats\": \"\"\n                }\n                st.session_state.wg_messages.append(init_msg)\n                st.session_state.wg_phase = 3\n                st.rerun()\n        with side_cols[1]:\n            if st.button(f\"{fb.get('flag','')} {fb.get('name','')} \uc9c4\uc601 \uc120\ud0dd\", use_container_width=True, type=\"primary\"):\n                st.session_state.wg_player_side = \"B\"\n                st.session_state.wg_a_troops = fa.get(\"troops\", 10000)\n                st.session_state.wg_b_troops = fb.get(\"troops\", 10000)\n                st.session_state.wg_messages = []\n                init_msg = {\n                    \"role\": \"assistant\",\n                    \"content\": {\n                        \"current_turn\": 1,\n                        \"situation_description\": sc.get(\"initial_situation\", \"\uc804\ud22c\uac00 \uc2dc\uc791\ub429\ub2c8\ub2e4.\"),\n                        \"next_options\": [\"\uc815\uba74 \uacf5\uaca9\", \"\uc6b0\ud68c \uae30\ub3d9\", \"\ubc29\uc5b4 \uc804\ud658\"],\n                        \"history_reference\": \"\"\n                    },\n                    \"post_turn_stats\": \"\"\n                }\n                st.session_state.wg_messages.append(init_msg)\n                st.session_state.wg_phase = 3\n                st.rerun()\n    \n    # \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n    # PHASE 3: INTERACTIVE TRPG BATTLE\n    # \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n    elif st.session_state.wg_phase == 3:\n        sc = st.session_state.wg_scenario\n        fa = sc.get(\"force_a\", {})\n        fb = sc.get(\"force_b\", {})\n        player = st.session_state.wg_player_side\n        player_name = fa.get(\"name\", \"A\") if player == \"A\" else fb.get(\"name\", \"B\")\n        enemy_name = fb.get(\"name\", \"B\") if player == \"A\" else fa.get(\"name\", \"A\")\n        \n        st.markdown(f\"### \ud83c\udfae {sc.get('scenario_title', '')} \u2014 {player_name} \uc9c4\uc601 \ud50c\ub808\uc774 \uc911\")\n        \n        # Status bar\n        stat_cols = st.columns(3)\n        stat_cols[0].metric(f\"\ud83d\udfe2 {fa.get('name','A')} \uc794\uc874 \ubcd1\ub825\", f\"{st.session_state.wg_a_troops:,}\uba85\")\n        stat_cols[1].metric(f\"\ud83d\udd34 {fb.get('name','B')} \uc794\uc874 \ubcd1\ub825\", f\"{st.session_state.wg_b_troops:,}\uba85\")\n        stat_cols[2].metric(\"\ud134\", f\"{len([m for m in st.session_state.wg_messages if m['role']=='user']) + 1}\")\n        \n        st.markdown(\"---\")\n        \n        # Chat display\n        for msg in st.session_state.wg_messages:\n            with st.chat_message(msg[\"role\"]):\n                if msg[\"role\"] == \"user\":\n                    st.write(msg[\"content\"])\n                else:\n                    data = msg.get(\"content\", {})\n                    if isinstance(data, dict):\n                        turn = data.get(\"current_turn\", 1)\n                        if turn == 1:\n                            st.markdown(\"### \ud83c\udfac \uc804\ud22c \uac1c\uc2dc\")\n                        else:\n                            st.markdown(f\"### \u23f3 Turn {turn}\")\n                            \n                        st.markdown(f\"**\uc804\ud669:** {data.get('situation_description', '')}\")\n                        \n                        opts = data.get(\"next_options\", [])\n                        if opts:\n                            st.info(\"\ud83d\udca1 **\uc120\ud0dd \uac00\ub2a5\ud55c \ud589\ub3d9:** \" + \" / \".join(opts))\n                            \n                        ref = data.get(\"history_reference\", \"\")\n                        if ref:\n                            st.caption(f\"\ud83d\udcd6 **\uacfc\uac70\uc758 \uad50\ud6c8:** {ref}\")\n                            \n                        if \"post_turn_stats\" in msg and msg[\"post_turn_stats\"]:\n                            st.success(f\"\ud83d\udcca **\ud134 \uc5f0\uc0b0 \uacb0\uacfc:** {msg['post_turn_stats']}\")\n                    else:\n                        st.write(data)\n        \n        # Check for victory\n        if st.session_state.wg_a_troops <= 0 or st.session_state.wg_b_troops <= 0:\n            if st.session_state.wg_a_troops > st.session_state.wg_b_troops:\n                winner = fa.get(\"name\", \"A\")\n            else:\n                winner = fb.get(\"name\", \"B\")\n            st.markdown(f\"## \ud83c\udfc6 \uc804\uc7c1 \uc885\uacb0 \u2014 **{winner}** \uc2b9\ub9ac!\")\n            st.balloons()\n        else:\n            # Chat input for player action\n            user_action = st.chat_input(f\"[{player_name}] \ub2e4\uc74c \uc804\ub7b5\uc801 \ud589\ub3d9\uc744 \uc785\ub825\ud558\uc138\uc694\")\n            \n            if user_action:\n                st.session_state.wg_messages.append({\"role\": \"user\", \"content\": user_action})\n                st.rerun()\n            \n            # If last message is from user, run GM\n            if st.session_state.wg_messages and st.session_state.wg_messages[-1][\"role\"] == \"user\":\n                with st.spinner(\"NEXUS GM \uc5f0\uc0b0 \uc911 (\ub780\uccb4\uc2a4\ud130 \ubaac\ud14c\uce74\ub97c\ub85c)...\"):\n                    from oracle import get_api_key\n                    if not get_api_key(\"gemini\"):\n                        st.error(\"API \ud0a4\ub97c \uc0ac\uc774\ub4dc\ubc14 \uba54\ub274\uc5d0 \uc124\uc815\ud574\uc8fc\uc138\uc694.\")\n                    else:\n                        from oracle import run_history_gm\n                        from engine import run_history_turn\n                        \n                        gm_res = run_history_gm(st.session_state.wg_messages, st.session_state.wg_messages[-1][\"content\"])\n                        \n                        if \"error\" in gm_res:\n                            st.error(f\"GM \uc5f0\uc0b0 \uc624\ub958: {gm_res['error']}\")\n                        else:\n                            eng_inputs = gm_res.get(\"engine_inputs\", {})\n                            \n                            # Turn outcome\n                            post_turn_stats = \"\"\n                            if st.session_state.wg_a_troops > 0 and st.session_state.wg_b_troops > 0:\n                                turn_res = run_history_turn(\n                                    st.session_state.wg_a_troops,\n                                    st.session_state.wg_b_troops,\n                                    0.001, 0.001,\n                                    eng_inputs\n                                )\n                                a_name = fa.get(\"name\", \"A\")\n                                b_name = fb.get(\"name\", \"B\")\n                                post_turn_stats = f\"{a_name} \uc0dd\uc874: **{turn_res['A_remaining']:,}** (-{turn_res['A_loss_count']:,}) | {b_name} \uc0dd\uc874: **{turn_res['B_remaining']:,}** (-{turn_res['B_loss_count']:,}) | {a_name} \uc2b9\ub960: {turn_res['win_rate']*100:.1f}%\"\n                                st.session_state.wg_a_troops = turn_res['A_remaining']\n                                st.session_state.wg_b_troops = turn_res['B_remaining']\n                            \n                            st.session_state.wg_messages.append({\n                                \"role\": \"assistant\",\n                                \"content\": gm_res,\n                                \"post_turn_stats\": post_turn_stats\n                            })\n                            st.rerun()\n\n\n# \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n#  NESIS \u2014 FM Data Editor (\uad6d\ub825 \uc5d0\ub514\ud130)\n# \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nif app_mode == '\u2694\ufe0f Nesis (Wargame)':\n    st.markdown('---')\n    st.markdown(\"## \ud83d\udee0\ufe0f FM Data Editor (\uad6d\ub825 \uc5d0\ub514\ud130)\")\n    st.markdown(\"\"\"\n    <div class=\"phronesis-panel-sage\">\n        <span class=\"olive-text\">Football Manager Style Editor<\\/span> \u2014\n        \uad6d\uac00\ubcc4 20\uac00\uc9c0 \ud575\uc2ec \uc5ed\ub7c9\uc744 \uc9c1\uc811 \uc870\uc791\ud558\uc5ec \uc6cc\uac8c\uc784 \uc2dc\ub098\ub9ac\uc624\uc5d0 \ubc18\uc601\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4.\n    <\\/div>\n    \"\"\", unsafe_allow_html=True)\n    \n    cnames_editor = list(st.session_state.dynamic_countries.keys())\n    if not cnames_editor:\n        st.info(\"\uc0ac\uc774\ub4dc\ubc14\uc5d0\uc11c \uad6d\uac00\ub97c \uba3c\uc800 \ub85c\ub4dc\ud574\uc8fc\uc138\uc694.\")\n    else:\n        edit_target = st.selectbox(\"\ud3b8\uc9d1\ud560 \uad6d\uac00 \uc120\ud0dd\", cnames_editor)\n        country_data = st.session_state.dynamic_countries[edit_target]\n        pm = country_data.get(\"power_metrics\", {})\n        \n        st.markdown(f\"### {country_data.get('flag', '\ud83c\udf0d')} {edit_target} \uc138\ubd80 \ub2a5\ub825\uce58 \uc870\uc815\")\n        \n        cat1, cat2 = st.columns(2)\n        cat3, cat4 = st.columns(2)\n        \n        def render_slider(col, title, key, default):\n            val = col.slider(title, 0, 100, int(pm.get(key, default)), key=f\"edit_{edit_target}_{key}\")\n            pm[key] = val\n            \n        with cat1:\n            st.markdown(\"#### 1. Military & Physical <br><span style='font-size:0.7em;color:gray;'>\uad70\uc0ac \ud558\ub4dc\ud30c\uc6cc<\\/span>\", unsafe_allow_html=True)\n            render_slider(st, \"\ud604\uc5ed \ubc0f \uc608\ube44\uad70 \uaddc\ubaa8\", \"military_troops_scale\", 50)\n            render_slider(st, \"\uad6d\ubc29\ube44 \uc9c0\ucd9c (GDP \ub300\ube44)\", \"military_budget_gdp\", 50)\n            render_slider(st, \"\ud575 \uc5b5\uc9c0\ub825 \uc810\uc218\", \"military_nuclear_deterrence\", 50)\n            render_slider(st, \"\uc7a5\ube44 \ud604\ub300\ud654 \uc9c0\uc218\", \"military_equipment_modernity\", 50)\n            render_slider(st, \"\uc5d0\ub108\uc9c0 \uc790\ub9bd\ub3c4\", \"military_energy_independence\", 50)\n            \n        with cat2:\n            st.markdown(\"#### 2. Economic Engine <br><span style='font-size:0.7em;color:gray;'>\uacbd\uc81c \ud30c\uc6cc<\\/span>\", unsafe_allow_html=True)\n            render_slider(st, \"\uc2e4\uc9c8 GDP (PPP)\", \"econ_real_gdp_ppp\", 50)\n            render_slider(st, \"\uc678\ud658 \ubcf4\uc720\uace0\", \"econ_foreign_reserves\", 50)\n            render_slider(st, \"\ubb34\uc5ed \uc758\uc874\ub3c4\", \"econ_trade_dependence\", 50)\n            render_slider(st, \"\uc81c\uc870\uc5c5/\ubc29\uc0b0 \uc0dd\uc0b0 \uc5ed\ub7c9\", \"econ_manufacturing_capacity\", 50)\n            render_slider(st, \"\uc2dd\ub7c9 \uc790\uae09\ub960\", \"econ_food_self_sufficiency\", 50)\n            \n        st.markdown(\"---\")\n            \n        with cat3:\n            st.markdown(\"#### 3. Digital & Tech <br><span style='font-size:0.7em;color:gray;'>\uae30\uc220 \ubc0f \uc815\ubcf4<\\/span>\", unsafe_allow_html=True)\n            render_slider(st, \"R&D \ud22c\uc790 \uaddc\ubaa8\", \"tech_rnd_investment\", 50)\n            render_slider(st, \"AI \ubc0f \ubc18\ub3c4\uccb4 \uc5ed\ub7c9\", \"tech_ai_semi_capacity\", 50)\n            render_slider(st, \"\uc0ac\uc774\ubc84 \uc804 \ub2a5\ub825\", \"tech_cyber_warfare\", 50)\n            render_slider(st, \"\uc704\uc131 \ubc0f \uc815\ubcf4 \uc790\uc0b0\", \"tech_space_intel\", 50)\n            render_slider(st, \"\ub514\uc9c0\ud138 \uc778\ud504\ub77c \ubcf5\uad6c\ub825\", \"tech_digital_resilience\", 50)\n            \n        with cat4:\n            st.markdown(\"#### 4. Soft & Social <br><span style='font-size:0.7em;color:gray;'>\uc0ac\ud68c \uc18c\ud504\ud2b8\ud30c\uc6cc<\\/span>\", unsafe_allow_html=True)\n            render_slider(st, \"\uad6d\ubbfc \uacb0\uc804 \uc758\uc9c0 (Morale)\", \"social_national_morale\", 50)\n            render_slider(st, \"\uc815\ubd80 \uc9c0\uc9c0\uc728 \ubc0f \uc815\ud1b5\uc131\", \"social_gov_legitimacy\", 50)\n            render_slider(st, \"\uc778\uad6c \uad6c\uc870 (\uccad\ub144\uce35 \ube44\uc728)\", \"social_youth_demographics\", 50)\n            render_slider(st, \"\uc678\uad50\uc801 \ub3d9\ub9f9 \uac15\ub3c4\", \"social_alliance_strength\", 50)\n            render_slider(st, \"\uad6d\uc81c \uc0ac\ud68c \uba85\ubd84 \uc810\uc218\", \"social_casus_belli\", 50)\n            \n        st.session_state.dynamic_countries[edit_target][\"power_metrics\"] = pm\n        \n        # SQLite DB\uc5d0 \uc218\uc815 \ub0b4\uc5ed \uc601\uad6c \ubc18\uc601\n        import db\n        db.update_power_metrics(edit_target, pm)\n        \n        st.caption(f\"\u2713 {edit_target}\uc758 \uc218\uc815\ub41c \ub2a5\ub825\uce58\ub294 \uc989\uc2dc \uc6cc\uac8c\uc784 \ub780\uccb4\uc2a4\ud130 \uc0c1\uc218\uacc4\uc0b0\uc5d0 \ubc18\uc601\ub418\uba70 DB\uc5d0 \uc800\uc7a5\ub429\ub2c8\ub2e4.\")\n\n\n# \u2500\u2500 Footer \u2500\u2500\nst.markdown(\"---\")\nst.markdown(\"\"\"\n<div style=\"text-align:center; padding:0.8rem 0; color:#c0c0b8; font-size:0.6rem;\n     letter-spacing:0.1em; font-family:'Inter',sans-serif;\">\n    Sharonesis \u2014 Practical Wisdom in Geopolitical Strategy<br>\n    \u26a0\ufe0f \uad50\uc721 \ubc0f \uc5f0\uad6c \ubaa9\uc801\uc758 \uc2dc\ubbac\ub808\uc774\uc158 \ub3c4\uad6c\uc785\ub2c8\ub2e4\n<\\/div>\n\"\"\", unsafe_allow_html=True)\n\n\n\n\n\n\n", "db.py": "\"\"\"\nSharonesis \u2014 SQLite \ub85c\uceec \ub370\uc774\ud130\ubca0\uc774\uc2a4 \ub9e4\ub2c8\uc800\n\uae30\uae30 \ub0b4 \uc800\uc7a5: sharonesis.db\n\"\"\"\n\nimport sqlite3\nimport json\nimport os\nimport sys\n\n# Emscripten(Stlite WebAssembly) \ud658\uacbd \uac10\uc9c0\nIS_WASM = sys.platform == 'emscripten'\n\nif IS_WASM:\n    # Stlite \ud658\uacbd: IndexedDB \ub9c8\uc6b4\ud2b8 \ud3ec\uc778\ud2b8 \uc0ac\uc6a9 (\uc601\uad6c \uc800\uc7a5)\n    DB_PATH = \"/mnt/idb/sharonesis.db\"\n    \n    # \ub9cc\uc57d \ub9c8\uc6b4\ud2b8 \ub514\ub809\ud1a0\ub9ac\uac00 \uc5c6\ub2e4\uba74 \uc0dd\uc131 \ubc29\uc5b4\ucf54\ub4dc (\uc2e4\uc81c \ub9c8\uc6b4\ud2b8\ub294 JS\ub2e8\uc5d0\uc11c \ud568)\n    try:\n        os.makedirs(\"/mnt/idb\", exist_ok=True)\n    except Exception:\n        pass\nelse:\n    # \uc77c\ubc18 \ub85c\uceec \ud658\uacbd\n    DB_PATH = os.path.join(os.path.dirname(os.path.abspath(__file__)), \"sharonesis.db\")\n\n# \u2500\u2500 \uc2dc\ub4dc \ub370\uc774\ud130 (\ucd5c\ucd08 \uc2e4\ud589 \uc2dc\uc5d0\ub9cc \uc0bd\uc785) \u2500\u2500\n_SEED_COUNTRIES = {\n    \"\ud83c\uddfa\ud83c\uddf8 United States\": {\n        \"code\": \"USA\", \"flag\": \"\ud83c\uddfa\ud83c\uddf8\", \"lat\": 38.9, \"lon\": -77.0,\n        \"troops\": 1_400_000, \"budget_t\": 0.886, \"nukes\": 5500,\n        \"navy_ships\": 490, \"aircraft\": 13300, \"tanks\": 6612,\n        \"color\": \"#6b7280\",\n        \"power_metrics\": {\n            \"military_troops_scale\": 100, \"military_budget_gdp\": 90, \"military_nuclear_deterrence\": 100,\n            \"military_equipment_modernity\": 95, \"military_energy_independence\": 80,\n            \"econ_real_gdp_ppp\": 100, \"econ_foreign_reserves\": 80, \"econ_trade_dependence\": 30,\n            \"econ_manufacturing_capacity\": 85, \"econ_food_self_sufficiency\": 90,\n            \"tech_rnd_investment\": 100, \"tech_ai_semi_capacity\": 95, \"tech_cyber_warfare\": 100,\n            \"tech_space_intel\": 100, \"tech_digital_resilience\": 90,\n            \"social_national_morale\": 70, \"social_gov_legitimacy\": 60, \"social_youth_demographics\": 50,\n            \"social_alliance_strength\": 95, \"social_casus_belli\": 80\n        }\n    },\n    \"\ud83c\udde8\ud83c\uddf3 China\": {\n        \"code\": \"CHN\", \"flag\": \"\ud83c\udde8\ud83c\uddf3\", \"lat\": 39.9, \"lon\": 116.4,\n        \"troops\": 2_035_000, \"budget_t\": 0.296, \"nukes\": 500,\n        \"navy_ships\": 370, \"aircraft\": 3285, \"tanks\": 5800,\n        \"color\": \"#a3a3a3\",\n        \"power_metrics\": {\n            \"military_troops_scale\": 95, \"military_budget_gdp\": 70, \"military_nuclear_deterrence\": 70,\n            \"military_equipment_modernity\": 80, \"military_energy_independence\": 40,\n            \"econ_real_gdp_ppp\": 95, \"econ_foreign_reserves\": 100, \"econ_trade_dependence\": 80,\n            \"econ_manufacturing_capacity\": 100, \"econ_food_self_sufficiency\": 70,\n            \"tech_rnd_investment\": 85, \"tech_ai_semi_capacity\": 80, \"tech_cyber_warfare\": 90,\n            \"tech_space_intel\": 85, \"tech_digital_resilience\": 70,\n            \"social_national_morale\": 85, \"social_gov_legitimacy\": 90, \"social_youth_demographics\": 40,\n            \"social_alliance_strength\": 60, \"social_casus_belli\": 60\n        }\n    },\n    \"\ud83c\uddf7\ud83c\uddfa Russia\": {\n        \"code\": \"RUS\", \"flag\": \"\ud83c\uddf7\ud83c\uddfa\", \"lat\": 55.8, \"lon\": 37.6,\n        \"troops\": 1_320_000, \"budget_t\": 0.109, \"nukes\": 6257,\n        \"navy_ships\": 310, \"aircraft\": 4173, \"tanks\": 12420,\n        \"color\": \"#78716c\",\n        \"power_metrics\": {\n            \"military_troops_scale\": 85, \"military_budget_gdp\": 85, \"military_nuclear_deterrence\": 100,\n            \"military_equipment_modernity\": 60, \"military_energy_independence\": 100,\n            \"econ_real_gdp_ppp\": 60, \"econ_foreign_reserves\": 50, \"econ_trade_dependence\": 70,\n            \"econ_manufacturing_capacity\": 70, \"econ_food_self_sufficiency\": 95,\n            \"tech_rnd_investment\": 50, \"tech_ai_semi_capacity\": 40, \"tech_cyber_warfare\": 85,\n            \"tech_space_intel\": 70, \"tech_digital_resilience\": 50,\n            \"social_national_morale\": 80, \"social_gov_legitimacy\": 75, \"social_youth_demographics\": 30,\n            \"social_alliance_strength\": 50, \"social_casus_belli\": 40\n        }\n    }\n}\n\n\ndef _get_conn():\n    \"\"\"SQLite \uc5f0\uacb0 \ubc18\ud658\"\"\"\n    conn = sqlite3.connect(DB_PATH)\n    if not IS_WASM:\n        # \ube0c\ub77c\uc6b0\uc800(IndexedDB) \ud658\uacbd\uc5d0\uc11c\ub294 WAL \ubaa8\ub4dc \ud638\ud658\uc131 \ubb38\uc81c\uac00 \uc0dd\uae38 \uc218 \uc788\uc73c\ubbc0\ub85c \uc81c\uc678\n        conn.execute(\"PRAGMA journal_mode=WAL;\")\n    conn.execute(\"PRAGMA foreign_keys=ON;\")\n    conn.row_factory = sqlite3.Row\n    return conn\n\n\ndef init_db():\n    \"\"\"\ud14c\uc774\ube14 \uc0dd\uc131 + \uc2dc\ub4dc \ub370\uc774\ud130 \uc0bd\uc785 (\ucd5c\ucd08 \uc2e4\ud589 \uc2dc\uc5d0\ub9cc)\"\"\"\n    conn = _get_conn()\n    conn.execute(\"\"\"\n        CREATE TABLE IF NOT EXISTS countries (\n            name TEXT PRIMARY KEY,\n            code TEXT NOT NULL,\n            flag TEXT DEFAULT '\ud83c\udf0d',\n            lat REAL DEFAULT 0,\n            lon REAL DEFAULT 0,\n            troops INTEGER DEFAULT 0,\n            budget_t REAL DEFAULT 0,\n            nukes INTEGER DEFAULT 0,\n            navy_ships INTEGER DEFAULT 0,\n            aircraft INTEGER DEFAULT 0,\n            tanks INTEGER DEFAULT 0,\n            color TEXT DEFAULT '#7a8a6a',\n            power_metrics TEXT DEFAULT '{}'\n        )\n    \"\"\")\n    \n    # \uc2dc\ub4dc \ub370\uc774\ud130: \ud14c\uc774\ube14\uc774 \ube44\uc5b4 \uc788\uc744 \ub54c\ub9cc \uc0bd\uc785\n    count = conn.execute(\"SELECT COUNT(*) FROM countries\").fetchone()[0]\n    if count == 0:\n        for name, data in _SEED_COUNTRIES.items():\n            _insert_country(conn, name, data)\n    \n    conn.commit()\n    conn.close()\n\n\ndef _insert_country(conn, name: str, data: dict):\n    \"\"\"\ub0b4\ubd80\uc6a9: \ub2e8\uc77c \uad6d\uac00 \uc0bd\uc785\"\"\"\n    pm = data.get(\"power_metrics\", {})\n    conn.execute(\"\"\"\n        INSERT OR REPLACE INTO countries \n        (name, code, flag, lat, lon, troops, budget_t, nukes, navy_ships, aircraft, tanks, color, power_metrics)\n        VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)\n    \"\"\", (\n        name,\n        data.get(\"code\", \"\"),\n        data.get(\"flag\", \"\ud83c\udf0d\"),\n        data.get(\"lat\", 0),\n        data.get(\"lon\", 0),\n        data.get(\"troops\", 0),\n        data.get(\"budget_t\", 0),\n        data.get(\"nukes\", 0),\n        data.get(\"navy_ships\", 0),\n        data.get(\"aircraft\", 0),\n        data.get(\"tanks\", 0),\n        data.get(\"color\", \"#7a8a6a\"),\n        json.dumps(pm, ensure_ascii=False)\n    ))\n\n\ndef get_all_countries() -> dict:\n    \"\"\"\ubaa8\ub4e0 \uad6d\uac00\ub97c \uae30\uc874 COUNTRIES dict \ud615\ud0dc\ub85c \ubc18\ud658\"\"\"\n    init_db()  # \ud14c\uc774\ube14\uc774 \uc5c6\uc73c\uba74 \uc790\ub3d9 \uc0dd\uc131\n    conn = _get_conn()\n    rows = conn.execute(\"SELECT * FROM countries ORDER BY name\").fetchall()\n    conn.close()\n    \n    result = {}\n    for row in rows:\n        result[row[\"name\"]] = {\n            \"code\": row[\"code\"],\n            \"flag\": row[\"flag\"],\n            \"lat\": row[\"lat\"],\n            \"lon\": row[\"lon\"],\n            \"troops\": row[\"troops\"],\n            \"budget_t\": row[\"budget_t\"],\n            \"nukes\": row[\"nukes\"],\n            \"navy_ships\": row[\"navy_ships\"],\n            \"aircraft\": row[\"aircraft\"],\n            \"tanks\": row[\"tanks\"],\n            \"color\": row[\"color\"],\n            \"power_metrics\": json.loads(row[\"power_metrics\"] or \"{}\")\n        }\n    return result\n\n\ndef upsert_country(name: str, data: dict):\n    \"\"\"\uad6d\uac00 \ucd94\uac00 \ub610\ub294 \uc5c5\ub370\uc774\ud2b8 (LLM \ub85c\ub4dc \ud6c4 DB \uc601\uad6c \uc800\uc7a5)\"\"\"\n    conn = _get_conn()\n    _insert_country(conn, name, data)\n    conn.commit()\n    conn.close()\n\n\ndef delete_country(name: str):\n    \"\"\"\uad6d\uac00 \uc0ad\uc81c\"\"\"\n    conn = _get_conn()\n    conn.execute(\"DELETE FROM countries WHERE name = ?\", (name,))\n    conn.commit()\n    conn.close()\n\n\ndef update_power_metrics(name: str, power_metrics: dict):\n    \"\"\"\ud2b9\uc815 \uad6d\uac00\uc758 power_metrics\ub9cc \uc5c5\ub370\uc774\ud2b8 (FM \uc5d0\ub514\ud130\uc6a9)\"\"\"\n    conn = _get_conn()\n    conn.execute(\n        \"UPDATE countries SET power_metrics = ? WHERE name = ?\",\n        (json.dumps(power_metrics, ensure_ascii=False), name)\n    )\n    conn.commit()\n    conn.close()\n", "countries.py": "\"\"\"\nSharonesis \u2014 \uad6d\uac00 \ub370\uc774\ud130 (SQLite DB \ub85c\ub4dc)\n\"\"\"\n\nfrom db import get_all_countries\n\n# DB\uc5d0\uc11c \ubaa8\ub4e0 \uad6d\uac00 \ub85c\ub4dc (\ucd5c\ucd08 \uc2e4\ud589 \uc2dc \uc2dc\ub4dc \ub370\uc774\ud130 \uc790\ub3d9 \uc0bd\uc785)\nCOUNTRIES = get_all_countries()\n", "engine.py": "\"\"\"\nSharonesis \u2014 Wargame Engine\n\ub780\uccb4\uc2a4\ud130 \uc81c\uacf1 \ubc95\uce59 + \ubaac\ud14c\uce74\ub97c\ub85c \uc2dc\ubbac\ub808\uc774\uc158 + \ube14\ub799\uc2a4\uc644\n\"\"\"\n\nimport numpy as np\nimport streamlit as st\n\n\n# \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n# COMBAT EFFICIENCY\n# \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ndef compute_combat_efficiency(data: dict) -> float:\n    \"\"\"20-Factor Model\uc744 \uc885\ud569\ud55c \uc804\ud22c \ud6a8\uc728 \uc0b0\ucd9c\uc2dd\"\"\"\n    pm = data.get(\"power_metrics\", {})\n    if not pm:\n        # Fallback\n        tech = data.get(\"tech_index\", 1.0)\n        bpt = data[\"budget_t\"] * 1e12 / max(data[\"troops\"], 1)\n        equip = (data[\"aircraft\"] + data[\"tanks\"] + data[\"navy_ships\"]) / max(data[\"troops\"] / 1000, 1)\n        return tech * (1 + bpt / 1e6) * (1 + equip / 100)\n        \n    # 1. Military (\uc7a5\ube44 \ud604\ub300\ud654, \uc5d0\ub108\uc9c0)\n    m_equip = pm.get(\"military_equipment_modernity\", 50) / 100.0\n    m_energy = pm.get(\"military_energy_independence\", 50) / 100.0\n    \n    # 2. Economic (\uc81c\uc870\uc5c5 \uc5ed\ub7c9)\n    e_mfg = pm.get(\"econ_manufacturing_capacity\", 50) / 100.0\n    \n    # 3. Tech (AI, \uc0ac\uc774\ubc84, \uc704\uc131)\n    t_ai = pm.get(\"tech_ai_semi_capacity\", 50) / 100.0\n    t_intel = pm.get(\"tech_space_intel\", 50) / 100.0\n    t_cyber = pm.get(\"tech_cyber_warfare\", 50) / 100.0\n    \n    # 4. Social (\uc0ac\uc591, \uacb0\uc804\uc758\uc9c0)\n    s_morale = pm.get(\"social_national_morale\", 50) / 100.0\n    \n    # \uc885\ud569 \ud6a8\uc728 \uc870\ud569\n    base_efficiency = m_equip * (1.0 + e_mfg * 0.5)\n    intel_multiplier = 1.0 + (t_ai * 0.4 + t_intel * 0.4 + t_cyber * 0.2)\n    morale_multiplier = 0.
